kind = "web"
previewPath = "/"
title = "Game Dev Tycoon Garage"
version = "1.0.0"
id = "artifacts/garage-scene"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19618

[services.development]
run = "pnpm --filter @workspace/garage-scene run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/garage-scene", "run", "build" ]
publicDir = "artifacts/garage-scene/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19618"
BASE_PATH = "/"
